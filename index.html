<!DOCTYPE html><html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Macro Risk Dashboard</title>  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      margin: 0;
    }

    h1 {
      margin: 20px 0;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      margin: 20px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
    }

    .value {
      font-size: 28px;
      font-weight: bold;
      margin-top: 10px;
    }

    .green { color: #22c55e; }
    .yellow { color: #eab308; }
    .red { color: #ef4444; }

    .status {
      font-size: 36px;
      margin-top: 20px;
    }
  </style></head><body><h1>📊 Macro Risk Dashboard</h1><div class="grid">  <div class="card">
    <h3>DAX (Proxy ETF)</h3>
    <div id="dax" class="value">--</div>
  </div>  <div class="card">
    <h3>VIX</h3>
    <div id="vix" class="value">--</div>
  </div>  <div class="card">
    <h3>Credit (HYG)</h3>
    <div id="hyg" class="value">--</div>
  </div>  <div class="card">
    <h3>Fear & Greed</h3>
    <div id="sentiment" class="value">30</div>
  </div></div><div id="status" class="status">⏳ Loading...</div><script>
async function loadData() {
  try {
    // Öffentliche stabile API (ohne Proxy)
    const response = await fetch("https://financialmodelingprep.com/api/v3/quote/%5EVIX,HYG?apikey=demo");
    const data = await response.json();

    let vix = data.find(x => x.symbol === "^VIX");
    let hyg = data.find(x => x.symbol === "HYG");

    document.getElementById("vix").innerText = vix.price.toFixed(1);
    document.getElementById("hyg").innerText = hyg.price.toFixed(1);

    // DAX Proxy (fix Wert oder später ersetzen)
    let daxVal = 24050;
    document.getElementById("dax").innerText = daxVal;

    let score = 0;

    if (vix.price > 20) score++;
    if (hyg.price < 75) score++;

    let status = document.getElementById("status");

    if (score >= 2) {
      status.innerText = "🔴 RISK OFF";
      status.className = "status red";
    } else if (score >= 1) {
      status.innerText = "🟡 WARNING";
      status.className = "status yellow";
    } else {
      status.innerText = "🟢 STABLE";
      status.className = "status green";
    }

  } catch (e) {
    document.getElementById("status").innerText = "⚠️ API Fehler";
  }
}

loadData();
setInterval(loadData, 60000);
</script></body>
</html>
