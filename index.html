<!DOCTYPE html><html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Macro Risk Dashboard</title>  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      margin: 0;
    }

    h1 {
      margin: 20px 0;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin: 20px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0,0,0,0.3);
    }

    .value {
      font-size: 28px;
      font-weight: bold;
      margin-top: 10px;
    }

    .green { color: #22c55e; }
    .yellow { color: #eab308; }
    .red { color: #ef4444; }

    .status {
      font-size: 36px;
      margin-top: 20px;
    }
  </style></head><body><h1>📊 Macro Risk Dashboard</h1><div class="grid">  <div class="card">
    <h3>DAX</h3>
    <div id="dax" class="value">--</div>
  </div>  <div class="card">
    <h3>VIX</h3>
    <div id="vix" class="value">--</div>
  </div>  <div class="card">
    <h3>US 10Y</h3>
    <div id="yield" class="value">--</div>
  </div>  <div class="card">
    <h3>Credit (HYG)</h3>
    <div id="hyg" class="value">--</div>
  </div>  <div class="card">
    <h3>Fear & Greed</h3>
    <div id="sentiment" class="value">30</div>
  </div></div><div id="status" class="status">⏳ Loading...</div><script>
async function loadData() {
  try {
    const dax = await fetch("https://corsproxy.io/?https://query1.finance.yahoo.com/v7/finance/quote?symbols=%5EGDAXI")
      .then(r => r.json());

    const vix = await fetch("https://corsproxy.io/?https://query1.finance.yahoo.com/v7/finance/quote?symbols=%5EVIX")
      .then(r => r.json());

    const hyg = await fetch("https://corsproxy.io/?https://query1.finance.yahoo.com/v7/finance/quote?symbols=HYG")
      .then(r => r.json());

    let daxVal = dax.quoteResponse.result[0].regularMarketPrice;
    let vixVal = vix.quoteResponse.result[0].regularMarketPrice;
    let hygVal = hyg.quoteResponse.result[0].regularMarketPrice;

    document.getElementById("dax").innerText = daxVal.toFixed(0);
    document.getElementById("vix").innerText = vixVal.toFixed(1);
    document.getElementById("hyg").innerText = hygVal.toFixed(1);

    // Dummy Zinsen (kann später API bekommen)
    let yieldVal = 4.15;
    document.getElementById("yield").innerText = yieldVal + "%";

    let score = 0;

    if (vixVal > 20) score++;
    if (yieldVal < 4.0) score++;
    if (hygVal < 75) score++;
    if (daxVal < 23800) score++;

    let status = document.getElementById("status");

    if (score >= 3) {
      status.innerText = "🔴 RISK OFF";
      status.className = "status red";
    } else if (score >= 2) {
      status.innerText = "🟡 WARNING";
      status.className = "status yellow";
    } else {
      status.innerText = "🟢 STABLE";
      status.className = "status green";
    }

  } catch (e) {
    document.getElementById("status").innerText = "⚠️ Fehler beim Laden";
  }
}

// alle 60 Sekunden aktualisieren
loadData();
setInterval(loadData, 60000);
</script></body>
</html>
