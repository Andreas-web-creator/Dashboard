<script>
async function loadData() {
  try {
    const response = await fetch("DEIN_GOOGLE_SHEET_LINK");
    const text = await response.text();

    const rows = text.split("\n");

    let vix = rows[0].split(",")[1];
    let hyg = rows[1].split(",")[1];
    let dax = rows[2].split(",")[1];
    let fear = rows[3].split(",")[1];

    document.getElementById("vix").innerText = vix;
    document.getElementById("hyg").innerText = hyg;
    document.getElementById("dax").innerText = dax;
    document.getElementById("sentiment").innerText = fear;

    let score = 0;

    if (vix > 20) score++;
    if (hyg < 75) score++;

    let status = document.getElementById("status");

    if (score >= 2) {
      status.innerText = "🔴 RISK OFF";
      status.className = "status red";
    } else if (score >= 1) {
      status.innerText = "🟡 WARNING";
      status.className = "status yellow";
    } else {
      status.innerText = "🟢 STABLE";
      status.className = "status green";
    }

  } catch (e) {
    document.getElementById("status").innerText = "⚠️ Datenfehler";
  }
}

loadData();
setInterval(loadData, 60000);
</script>
